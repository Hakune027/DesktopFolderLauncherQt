name: Build and publish release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release 版本号，例如 v1.0.0"
        required: true
        type: string
      prerelease:
        description: "标记为预发布版本"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Windows x64 release
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Validate version
        shell: pwsh
        run: |
          $version = '${{ inputs.version }}'
          if ($version -notmatch '^v?[0-9]+\.[0-9]+\.[0-9]+(?:[-.][0-9A-Za-z.-]+)?$') {
            throw "版本号格式无效：$version（示例：v1.0.0）"
          }

      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Qt and MinGW
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: 'win64_mingw'
          tools: 'tools_mingw1310'
          cache: true

      - name: Configure
        shell: pwsh
        run: >-
          cmake -S . -B build-release -G "MinGW Makefiles"
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=ON

      - name: Build
        shell: pwsh
        run: cmake --build build-release --parallel $env:NUMBER_OF_PROCESSORS

      - name: Test
        shell: pwsh
        run: ctest --test-dir build-release --output-on-failure --timeout 30

      - name: Deploy Qt runtime
        shell: pwsh
        run: |
          $package = Join-Path $PWD 'package\DeskFolder'
          New-Item -ItemType Directory -Force -Path $package | Out-Null
          Copy-Item 'build-release\DesktopFolderLauncher.exe' $package
          windeployqt --release --compiler-runtime --qmldir qml --dir $package "$package\DesktopFolderLauncher.exe"
          Copy-Item README.md $package -ErrorAction SilentlyContinue
          Copy-Item LICENSE $package -ErrorAction SilentlyContinue

      - name: Build Windows installer
        id: installer
        shell: pwsh
        run: |
          $tag = '${{ inputs.version }}'
          $version = $tag.TrimStart('v')
          $outputName = "DeskFolder-$tag-windows-x64-Setup"
          $outputDir = Join-Path $PWD 'installer-output'
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null

          $iscc = Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'
          if (-not (Test-Path $iscc)) {
            choco install innosetup --no-progress -y
          }
          if (-not (Test-Path $iscc)) {
            throw 'Inno Setup 6 安装失败'
          }

          & $iscc "packaging\DeskFolder.iss" "/DMyAppVersion=$version" "/DMyOutputDir=$outputDir" "/DMyOutputName=$outputName"
          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup 编译失败，exit code: $LASTEXITCODE"
          }
          $outputPath = Join-Path $outputDir "$outputName.exe"
          if (-not (Test-Path $outputPath) -or (Get-Item $outputPath).Length -lt 1MB) {
            throw '生成的安装程序无效'
          }

          "path=$outputPath" >> $env:GITHUB_OUTPUT
          "name=$outputName.exe" >> $env:GITHUB_OUTPUT

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ inputs.version }}'
          $asset = '${{ steps.installer.outputs.path }}'
          $title = "DeskFolder $tag"

          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = 'application/vnd.github+json'
            'X-GitHub-Api-Version' = '2022-11-28'
          }
          $encodedTag = [Uri]::EscapeDataString($tag)
          $releaseUrl = "https://api.github.com/repos/${{ github.repository }}/releases/tags/$encodedTag"
          $exists = $false
          try {
            Invoke-RestMethod -Uri $releaseUrl -Headers $headers | Out-Null
            $exists = $true
          } catch {
            if ($_.Exception.Response.StatusCode.value__ -ne 404) { throw }
          }

          if ($exists) {
            $oldAssets = gh release view $tag --json assets --jq '.assets[].name'
            foreach ($oldAsset in $oldAssets) {
              if ($oldAsset) {
                gh release delete-asset $tag $oldAsset --yes
                if ($LASTEXITCODE -ne 0) { throw "删除旧 Release 资源失败：$oldAsset" }
              }
            }
            gh release upload $tag $asset --clobber
            gh release edit $tag --draft=false
          } else {
            $arguments = @('release', 'create', $tag, $asset, '--target', '${{ github.sha }}', '--title', $title, '--generate-notes')
            if ('${{ inputs.prerelease }}' -eq 'true') {
              $arguments += '--prerelease'
            }
            gh @arguments
          }
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub Release 发布失败，gh exit code: $LASTEXITCODE"
          }
          $releaseLink = gh release view $tag --json url --jq .url
          "### Release 已发布：[$tag]($releaseLink)" >> $env:GITHUB_STEP_SUMMARY
