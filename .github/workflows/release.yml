name: Build and publish release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release 版本号，例如 v1.0.0"
        required: true
        type: string
      prerelease:
        description: "标记为预发布版本"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Windows x64 release
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Validate version
        shell: pwsh
        run: |
          $version = '${{ inputs.version }}'
          if ($version -notmatch '^v?[0-9]+\.[0-9]+\.[0-9]+(?:[-.][0-9A-Za-z.-]+)?$') {
            throw "版本号格式无效：$version（示例：v1.0.0）"
          }

      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Qt and MinGW
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: 'win64_mingw'
          tools: 'tools_mingw1310'
          cache: true

      - name: Configure
        shell: pwsh
        run: >-
          cmake -S . -B build-release -G "MinGW Makefiles"
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=ON

      - name: Build
        shell: pwsh
        run: cmake --build build-release --parallel $env:NUMBER_OF_PROCESSORS

      - name: Test
        shell: pwsh
        run: ctest --test-dir build-release --output-on-failure --timeout 30

      - name: Deploy Qt runtime
        shell: pwsh
        run: |
          $package = Join-Path $PWD 'package\DeskFolder'
          New-Item -ItemType Directory -Force -Path $package | Out-Null
          Copy-Item 'build-release\DesktopFolderLauncher.exe' $package
          windeployqt --release --compiler-runtime --qmldir qml --dir $package "$package\DesktopFolderLauncher.exe"
          Copy-Item README.md $package -ErrorAction SilentlyContinue
          Copy-Item LICENSE $package -ErrorAction SilentlyContinue

      - name: Build Windows installer
        id: installer
        shell: pwsh
        run: |
          $tag = '${{ inputs.version }}'
          $version = $tag.TrimStart('v')
          $outputName = "DeskFolder-$tag-windows-x64-Setup"
          $outputDir = Join-Path $PWD 'installer-output'
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null

          $iscc = Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'
          if (-not (Test-Path $iscc)) {
            choco install innosetup --no-progress -y
          }
          if (-not (Test-Path $iscc)) {
            throw 'Inno Setup 6 安装失败'
          }

          $languageFile = Join-Path $PWD 'packaging\ChineseSimplified.isl'
          if (-not (Test-Path $languageFile) -or (Get-Item $languageFile).Length -lt 10KB) {
            throw '项目内缺少 Inno Setup 简体中文语言文件'
          }

          & $iscc "packaging\DeskFolder.iss" "/DMyAppVersion=$version" "/DMyOutputDir=$outputDir" "/DMyOutputName=$outputName"
          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup 编译失败，exit code: $LASTEXITCODE"
          }
          $outputPath = Join-Path $outputDir "$outputName.exe"
          if (-not (Test-Path $outputPath) -or (Get-Item $outputPath).Length -lt 1MB) {
            throw '生成的安装程序无效'
          }

          "path=$outputPath" >> $env:GITHUB_OUTPUT
          "name=$outputName.exe" >> $env:GITHUB_OUTPUT

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ inputs.version }}'
          $asset = '${{ steps.installer.outputs.path }}'
          $title = "DeskFolder $tag"

          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = 'application/vnd.github+json'
            'X-GitHub-Api-Version' = '2022-11-28'
          }

          # Listing releases also returns drafts to an authenticated caller.
          # This lets a rerun repair a previous attempt which created a tag or
          # draft but failed before publishing it.
          $apiRoot = "https://api.github.com/repos/${{ github.repository }}"
          $allReleases = Invoke-RestMethod -Uri "$apiRoot/releases?per_page=100" -Headers $headers
          $release = $allReleases | Where-Object { $_.tag_name -eq $tag } | Select-Object -First 1
          $isPrerelease = '${{ inputs.prerelease }}' -eq 'true'
          $latestMode = if ($isPrerelease) { 'false' } else { 'true' }

          if ($null -eq $release) {
            $createBody = @{
              tag_name = $tag
              target_commitish = '${{ github.sha }}'
              name = $title
              draft = $false
              prerelease = $isPrerelease
              make_latest = $latestMode
              generate_release_notes = $true
            } | ConvertTo-Json -Compress
            $release = Invoke-RestMethod -Method Post -Uri "$apiRoot/releases" `
              -Headers $headers -ContentType 'application/json' -Body $createBody
          } else {
            $updateBody = @{
              name = $title
              draft = $false
              prerelease = $isPrerelease
              make_latest = $latestMode
            } | ConvertTo-Json -Compress
            $release = Invoke-RestMethod -Method Patch -Uri "$apiRoot/releases/$($release.id)" `
              -Headers $headers -ContentType 'application/json' -Body $updateBody
          }

          foreach ($oldAsset in $release.assets) {
            Invoke-RestMethod -Method Delete -Uri $oldAsset.url -Headers $headers
          }

          $assetName = [IO.Path]::GetFileName($asset)
          $encodedName = [Uri]::EscapeDataString($assetName)
          $uploadUrl = "https://uploads.github.com/repos/${{ github.repository }}/releases/$($release.id)/assets?name=$encodedName"
          $uploaded = Invoke-RestMethod -Method Post -Uri $uploadUrl -Headers $headers `
            -ContentType 'application/octet-stream' -InFile $asset
          if ($null -eq $uploaded.id -or $uploaded.state -ne 'uploaded') {
            throw '安装器上传到 GitHub Release 后未处于 uploaded 状态'
          }

          # Query once more so an API or permission issue cannot leave this
          # workflow green while the public Release is still absent.
          $published = Invoke-RestMethod -Uri "$apiRoot/releases/$($release.id)" -Headers $headers
          if ($published.draft -or $published.tag_name -ne $tag) {
            throw 'Release 创建完成但仍为草稿或版本标签不匹配'
          }
          $publishedAsset = $published.assets | Where-Object { $_.name -eq $assetName }
          if ($null -eq $publishedAsset) {
            throw 'Release 已创建，但安装器资源不存在'
          }
          "### Release 已发布：[$tag]($($published.html_url))" >> $env:GITHUB_STEP_SUMMARY
